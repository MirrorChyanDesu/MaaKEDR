name: Check

on:
  pull_request:
    paths-ignore:
      - "docs/**"
      - ".github/workflows/**"
  push:
    branches: [main, master]
    paths-ignore:
      - "docs/**"
      - ".github/workflows/**"

jobs:
  check:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        if: hashFiles('pyproject.toml') != ''
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v8.1.0
        if: hashFiles('pyproject.toml') != ''
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: node tools/check-project.mjs
      - run: pnpm install --frozen-lockfile
      - run: pnpm check:ci
      - run: pnpm check:py
        if: hashFiles('pyproject.toml') != ''

---
name: Check Docs

on:
  pull_request:
    paths:
      - "docs/**"
  push:
    branches: [main, master]
    paths:
      - "docs/**"

jobs:
  check-docs:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm docs:build
